<?xml version="1.0" encoding="UTF-8"?>
<!--
  Llama Menu — menu bar glyph
  Template-ready: pure black (#000) on transparent.
  16×16 viewBox; renders cleanly at 18–22pt in the macOS menu bar.
-->
<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft rounded tile -->
  <rect x="1.25" y="1.25" width="13.5" height="13.5" rx="4" fill="black"/>
  <!-- Inverted “spark” — three rays suggesting a local model lighting up -->
  <path
    d="M8 3.6L8.55 6.15L11.1 6.7L8.55 7.25L8 9.8L7.45 7.25L4.9 6.7L7.45 6.15L8 3.6Z"
    fill="white"/>
  <!-- Small baseline mark (stability / grounded local server) -->
  <rect x="5.25" y="11.1" width="5.5" height="1.15" rx="0.55" fill="white"/>
</svg>
